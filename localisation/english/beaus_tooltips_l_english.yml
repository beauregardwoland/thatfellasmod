 jap_display_modifiers_tt: "Number of curently held [JAP.GetFlag]Jappense islands §Y[?global.jap_held_islands]§!\nNumber of curently held [USA.GetFlag][ENG.GetFlag]Allied islands §Y[?global.jap_held_islands]§!\n\n[JAP.GetFlag]§YWar Industry§! changes with ranges of §Rx§! = #of[JAP.GetFlag]Islands Held:\n§Y1§!<§Rx§!<=§Y4§!(War Industry §YI§!)| §Y5§!<§Rx§!<=§Y8§!(War Industry §YII§!)\n§Y9§!<§Rx§!<=§Y12§!(War Industry §YIII§!)| §Y13§!<§Rx§!<=§Y16§!(War Industry §YIV§!)\n\nEach island represents §Y2.0%§! §gStability , War Support, Core Attack\nand Core Defense§!\nCurrent Effects on Jappenese spirits:            v [JAP.GetFlag]War Industry lvl v\n   War Support: [?JAP.JAP_state_shinotism_war_support_factor|+=%1]\n   Stability: [?JAP.JAP_state_shinotism_war_support_factor|+=%1]\n   Attack on Core Territory: [?JAP.JAP_state_shinotism_army_core_attack_factor|+=%1]\n   Defense on Core Territory: [?JAP.JAP_state_shinotism_army_core_defence_factor|+=%1]"

 asia_war_tt2: "The §YAsia War§! is divided into 5 regions each worth §R-5.0%§! Attack\nand Defense against all §YEuropean Axis Members§!\nThe regions mentioned can be highlighted from decisions below\nand are as follows:\n§Y   Burma and Bengal§!\n§Y   The Signapore Straits§!\n§Y   India Proper§!\n§Y   The Phillipines§!\n§Y   The Outer Indonesia§!\nFor every debuff of §R-5.0%§! against §YEuropean axis members§! starting\nat §R-10.0%§! a attack and defense bonus of §Y2.5%§! will be given\nagainst [JAP.GetFlag]§YJapan§! to the allies for a maximum of §G+10.0%§! Attack and Defense.\n\nSo long as the [PHI.GetFlag]§YPhillipines§! are held [USA.GetFlag]§YAmerica§! will recieve a defensive bonus on its held starting islands.\n[AST.GetFlag]§YAustralia§! and [NZL.GetFlag]§YNew Zealand§! will receive a core attack and defense bonus while §YOuter Indonesia§! is held and recieve a manpower and mobilization bonus when it falls.\nThe fall of [RAJ.GetFlag]§YIndia§! will give [JAP.GetFlag]§YJapan§! an attack modifier against the §YSoviet Union§! and a supply bonus\n\nCurrent [JAP.GetFlag]§YJapanese§! Operation: [jap_current_operation_sop]\nCurrent [USA.GetFlag][ENG.GetFlag]§YAllied§! Operation: [usa_current_operation_sop]"

