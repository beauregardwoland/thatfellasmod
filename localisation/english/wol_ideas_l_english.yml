 FDR_1936_election_tooltip:0"The FDR Campaign events will focus on promises to gradually fix the depression with options to become a §Yvolunteer country§!, better options to get §Ycongressional support§! and improveing the §Ynew deal modifier§!. America will play out in very vanilla way scaling harder over the entrance to the war and supporting the allies before entrance."
 AL_1936_election_tooltip:0"The Alf Landon Campaign events will focus on fixeing the depression at the cost of stability with options to cooperate with buisnesses §Yboosting mios§! or §Yindustrial concerns§!. America will loose later scaling potential but can start building up its position better for an entrance to the war compared to vanilla."

 wol_usa.1.t:0"Campaigning season for the [getyear] election"
 wol_usa.1.d:0"Campainging for the [getyear] election is in full swing, with the candidates making promises and trying to win over voters. The outcome of the election will have a significant impact on the direction of the country and economical recovery."
 wol_usa.1.a:0"Four more years. (Play as the Democrats)"
 wol_usa.1.b:0"We must protect the American system.(Play as the Republicans)"

 wol_usa.2.t:0"Adressing Consumer Purchaseing Power"
 wol_usa.2.d:0"In a statement to the press, FDR anounces a new series of legislation meant to tackle the unemployment by..."
 wol_usa.2.a:0"Expanding Works Programs"
 wol_usa.2.b:0"Expanding Unemployment Benefits"

 wol_usa.3.t:0"Concerneing isolationists"
 wol_usa.3.d:0"Despite the uninterest of much of American society in foreign entanglements many choose to volunteer abroad as soldiers, support staff or as humanitarian aid workers. Supporting them would prove a great boon to certain governments and energize interventionists at home but would draw the ire of isolationistrs already who can block our measures to coalition in the legislture."
 wol_usa.3.a:0"We cannot risk a loss of congressional support"
 wol_usa.3.b:0"We must support Americans even if they are abroad"

 wol_usa.4.t:0"Adressing Stagflation"
 wol_usa.4.d:0"In a rallying speech, FDR have adressed the issue of the current stagflation crisis. He intends to adress it by promseing..."
 wol_usa.4.a:0"Building up real wages"
 wol_usa.4.b:0"Increaseing Bank Securities"

 wol_usa.5.t:0"Keynesianism"
 wol_usa.5.d:0"A recent interview has trapped the president into answering whether or not he will continue his keynesian policies to the detriment of the federal defeceit."
 wol_usa.5.a:0"We must not be afraid to lend"
 wol_usa.5.b:0"we will strive for fiscal stability when possible"

 wol_usa.6.t:0"Educational Orders Program"
 wol_usa.6.d:0"The governments policy of educational orders contracts meant to framilirize different compaines with the production of war materials has entered some trouble. The straight production of war materials is the best way to get machinery already tooled and ready though it limits how widespread and far these orders can reach. Expansion of manuels and routine for retooling machines has proven a good and far reaching use of funds but limits starting potential."
 wol_usa.6.a:0"The tooling efforts should continues"
 wol_usa.6.b:0"Who doesnt like a good book"

 wol_usa.7.t:0"Anounceing Alf Landons New Deal"
 wol_usa.7.d:0"Learning from Hoovers shortcoming Alf Landon has promised a package of legislature meant to tackle the depression head on with intervention. This deal is meant to bypass the faults and criticism's of the FDR's new deal though his first promise is..."
 wol_usa.7.a:0"Anouunceing stronger relief for buisness"
 wol_usa.7.b:0"Focuseing on supporting small buisness owners"

 wol_usa.8.t:0"Anounceing a Balanced Budget"
 wol_usa.8.d:0"Campagining on balanceing a budget is one thing answer how you will do it is another a question which has bogged campaign momentum immensely. Adressing this question will reverse some of the uncertainty people will feel towards our plans."
 wol_usa.8.a:0"Anounce gradual cuts to benefits"
 wol_usa.8.b:0"Anounce a tax reorganization"

 wol_usa.9.t:0"Industrialist quid pro quo"
 wol_usa.9.d:0"placeholder"
 wol_usa.9.a:0"Prefer broad industrial cooperation"
 wol_usa.9.b:0"We must have the option to chooce the best for the job"

 wol_usa.10.t:0"Military Contracting"
 wol_usa.10.d:0"placeholder"
 wol_usa.10.a:0"Favor New Startups"
 wol_usa.10.b:0"Prioritize Established contractors"

